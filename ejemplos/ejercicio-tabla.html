<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Tablas</title>
</head>
<header>
    <h1 style="text-align: center;">Ejercicio Tablas</h1>
</header>
<body>
    <main>
        <table border="1" style="width: 80%;">
            <tr>
                <td colspan="5" style="text-align: center;">Combinar celdas en diferentes filas en una tabla (rowspan)</td>
            </tr>
            <tr>
                <td rowspan="4" style="text-align: center;">1</td>
                <td style="text-align: center;">2</td>
                <td rowspan="3" style="text-align: center;">3</td>                
                <td style="text-align: center;">4</td>
                <td style="text-align: center;">5</td>
            </tr>
            <tr>
                <td style="text-align: center;">6</td>
                <td rowspan="3" style="text-align: center;">7</td>
                <td rowspan="2" style="text-align: center;">8</td>
            </tr>
            <tr>
                <td style="text-align: center;">9</td>
            </tr>
            <tr>
                <td style="text-align: center;">10</td>
                <td style="text-align: center;">11</td>
                <td style="text-align: center;">12</td>
            </tr>
            <tr>
                <td style="text-align: center;">13</td>
                <td colspan="3 " rowspan="2" style="text-align: center;">14</td>
                <td style="text-align: center;">15</td>
            </tr>
            <tr>
                <td style="text-align: center;">16</td>
                <td style="text-align: center;">17</td>
            </tr>
        </table>
    </main>
    
</body>
</html>
